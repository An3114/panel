<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Punto de Combos — Calculadora de Streaming</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<!-- Librería para tomar captura de la factura -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
  :root {
    --shell: #15171c;
    --shell-raised: #1e212a;
    --shell-border: #2b2f38;
    --paper: #eef1e4;
    --paper-shadow: #dfe4d3;
    --ink: #22271d;
    --ink-soft: #565f4d;
    --led: #3ee08a;Disney
    --accent-red: #e2543f;
    --accent-green: #1f8a5f;
    --key: #2a2e37;
    --key-hi: #3a3f4b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background:
      radial-gradient(circle at 15% 10%, rgba(62,224,138,0.05), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(226,84,63,0.06), transparent 45%),
      var(--shell);
    color: var(--ink);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 20px 60px;
  }
  
  /* Máximo ancho ampliado para ocupar bien la pantalla */
  .machine { width: 100%; max-width: 1350px; }
  
  .chassis-header {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 0 4px 20px; color: #cfd3c9; flex-wrap: wrap; gap: 6px;
  }
  .brand {
    font-family: 'Space Grotesk', sans-serif; font-weight: 700;
    font-size: 1.4rem; letter-spacing: 0.02em; display: flex;
    align-items: center; gap: 12px;
  }
  .brand-led {
    width: 10px; height: 10px; border-radius: 50%; background: var(--led);
    box-shadow: 0 0 10px var(--led), 0 0 3px var(--led);
  }
  .chassis-sub { font-size: 0.85rem; color: #7c8375; letter-spacing: 0.03em; }
  
  /* ---- GRILLA DE 2 COLUMNAS (Panel a la izq, Factura y Calculadora a la der) ---- */
  .deck { 
    display: grid; 
    grid-template-columns: 1.3fr 1fr; /* La columna izquierda es un poco más ancha */
    grid-template-areas: 
      "panel receipt"
      "panel calc";
    gap: 32px; 
    align-items: start; 
  }
  
  .panel-col { grid-area: panel; }
  .receipt-col { grid-area: receipt; display: flex; flex-direction: column; gap: 20px; }
  .calc-col { grid-area: calc; display: flex; flex-direction: column; gap: 20px; }

  /* ---- Selector panel ---- */
  .panel { background: var(--shell-raised); border: 1px solid var(--shell-border); border-radius: 16px; padding: 26px; }
  .panel > h2 {
    font-family: 'Space Grotesk', sans-serif; font-size: 1.05rem; color: #e7e9e1;
    font-weight: 600; letter-spacing: 0.03em; display: flex;
    justify-content: space-between; align-items: baseline; margin-bottom: 16px;
  }
  .panel > h2 .eyebrow {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: var(--led);
    text-transform: uppercase; letter-spacing: 0.12em; font-weight: 500;
  }
  .tier + .tier { margin-top: 18px; }
  .tier-label {
    font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: #7c8375; margin-bottom: 8px; display: flex; align-items: center; gap: 10px;
  }
  .tier-label::after { content: ''; flex: 1; height: 1px; background: var(--shell-border); }
  
  .service-row {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(255,255,255,0.02); border: 1px solid transparent;
    border-radius: 9px; padding: 9px 12px; margin-bottom: 6px;
    transition: border-color .15s, background .15s;
  }
  .service-row.active { border-color: rgba(62,224,138,0.35); background: rgba(62,224,138,0.06); }
  .service-info { display: flex; flex-direction: column; gap: 2px; }
  .service-name { font-size: 0.9rem; color: #e7e9e1; font-weight: 500; }
  .service-price { font-size: 0.75rem; color: #7c8375; }

  .qty-control { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.25); border-radius: 7px; padding: 4px 6px; }
  .qty-control button {
    background: var(--key); color: #e7e9e1; border: none; width: 28px; height: 28px;
    border-radius: 6px; cursor: pointer; font-size: 1.2rem; font-family: inherit; line-height: 1; display:flex; align-items:center; justify-content:center;
  }
  .qty-control button:hover { background: var(--key-hi); }
  .qty-control button:active { transform: scale(0.92); }
  .qty-control .qty { min-width: 18px; text-align: center; font-size: 1rem; color: #fff; font-weight: 600; }

  /* Inputs de plataforma personalizada */
  .custom-input-group { display: flex; gap: 10px; margin-bottom: 8px; }
  .custom-input {
    flex: 1; background: var(--shell); border: 1px solid var(--shell-border);
    color: #fff; padding: 10px 14px; border-radius: 8px; font-family: inherit; font-size: 0.9rem; outline: none;
  }
  .custom-input:focus { border-color: var(--led); }
  .custom-btn {
    background: var(--key); color: #e7e9e1; border: none; padding: 0 16px;
    border-radius: 8px; font-family: inherit; cursor: pointer; font-weight: 600; font-size: 0.9rem;
  }
  .custom-btn:hover { background: var(--key-hi); }

  /* Checkbox Oferta del Día */
  .checkbox-label {
    display: flex; align-items: center; gap: 10px; color: #e7e9e1; font-size: 0.9rem; cursor: pointer;
    background: rgba(255,255,255,0.02); padding: 12px 16px; border-radius: 8px; border: 1px solid var(--shell-border);
  }
  .checkbox-label:hover { background: rgba(255,255,255,0.04); }

  /* ---- Receipt column ---- */
  .receipt { position: relative; filter: drop-shadow(0 14px 24px rgba(0,0,0,0.45)); }
  .torn {
    height: 11px;
    background: linear-gradient(-45deg, var(--paper) 6px, transparent 0), linear-gradient(45deg, var(--paper) 6px, transparent 0);
    background-position: left top; background-repeat: repeat-x; background-size: 14px 14px;
  }
  .torn.bottom { transform: scaleY(-1); }

  .receipt-body { background: var(--paper); color: var(--ink); padding: 26px 26px 22px; }
  .receipt-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.2rem; letter-spacing: 0.03em; text-align: center; }
  .receipt-sub { text-align: center; font-size: 0.75rem; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.12em; margin-top: 4px; margin-bottom: 16px; }
  .receipt-dash { border: none; border-top: 1px dashed #b9c0a8; margin: 12px 0; }
  .receipt-lines { min-height: 26px; }
  .receipt-line { display: flex; justify-content: space-between; gap: 10px; font-size: 0.9rem; padding: 4px 0; }
  .receipt-line .name { color: var(--ink); font-weight: 500; }
  .receipt-line .qty { color: var(--ink-soft); white-space: nowrap; }
  .receipt-empty { font-size: 0.85rem; color: var(--ink-soft); text-align: center; padding: 10px 0 6px; font-style: italic; }
  .receipt-note { font-size: 0.72rem; color: var(--ink-soft); text-align: center; margin-top: 8px; letter-spacing: 0.02em; font-weight: bold;}
  .receipt-total-row { display: flex; justify-content: space-between; align-items: baseline; margin-top: 8px; }
  .receipt-total-row span:first-child { font-size: 0.85rem; letter-spacing: 0.12em; color: var(--ink-soft); font-weight: 600;}
  #total-display { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 2.2rem; color: var(--accent-green); }
  
  .receipt-hours {
    font-size: 0.65rem; color: var(--ink-soft); text-align: center; 
    margin-top: 16px; letter-spacing: 0.05em; font-family: 'Space Grotesk', sans-serif;
    border-top: 1px solid #dfe4d3; padding-top: 10px;
  }

  .admin-stamp {
    margin-top: 16px; border: 2px solid var(--accent-red); color: var(--accent-red);
    font-weight: 700; font-size: 0.9rem; text-align: center; padding: 10px;
    border-radius: 4px; transform: rotate(-2deg); letter-spacing: 0.03em;
  }
  .hidden { display: none !important; }

  /* ---- Elementos de copia e input administrador ---- */
  .admin-override-box {
    background: rgba(226, 84, 63, 0.1); border: 1px dashed var(--accent-red);
    padding: 14px; border-radius: 8px; display: flex; flex-direction: column; gap: 8px;
  }
  .admin-override-box label { font-size: 0.8rem; color: var(--accent-red); font-weight: 700; letter-spacing: 0.05em; }
  .admin-override-box input {
    background: var(--shell); border: 1px solid var(--accent-red); color: #fff;
    padding: 12px; border-radius: 6px; font-family: 'IBM Plex Mono', monospace; font-size: 1.1rem; outline: none;
  }

  .btn-group { display: flex; gap: 12px; width: 100%; }
  
  .action-btn {
    flex: 2; background: var(--led); color: var(--ink); border: none; padding: 16px;
    border-radius: 10px; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.1rem;
    cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .action-btn:hover { filter: brightness(1.1); }
  .action-btn:active { transform: scale(0.98); }
  .action-btn.copied { background: #3498db; color: #fff; }
  
  .clear-btn {
    flex: 1; background: transparent; border: 1px solid var(--shell-border);
    color: #cfd3c9; font-size: 0.95rem;
  }
  .clear-btn:hover { background: rgba(255,255,255,0.05); color: #fff; filter: none; }

  /* ---- Calculator widget (Más grande y proporcionado) ---- */
  .calc-widget { background: var(--shell-raised); border: 1px solid var(--shell-border); border-radius: 16px; padding: 22px; }
  .calc-screen {
    background: #0e0f13; border: 1px solid var(--shell-border); border-radius: 10px;
    color: var(--led); font-size: 2rem; text-align: right; padding: 16px 20px;
    margin-bottom: 16px; min-height: 70px; display: flex; align-items: center;
    justify-content: flex-end; overflow: hidden; word-break: break-all;
  }
  .calc-keys { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
  .calc-btn { 
    background: var(--key); color: #e7e9e1; border: none; font-family: 'IBM Plex Mono', monospace; 
    font-size: 1.25rem; font-weight: 600; padding: 18px 0; border-radius: 8px; cursor: pointer; 
  }
  .calc-btn:hover { background: var(--key-hi); }
  .calc-btn:active { transform: scale(0.95); }
  .calc-btn.op { background: #3a3350; color: #c9bdfc; }
  .calc-btn.op:hover { background: #463d61; }
  .calc-btn.clear { background: var(--accent-red); color: #1a0c08; grid-column: span 2; }
  .calc-btn.equal { background: var(--accent-green); color: #062015; grid-column: span 2; }

  /* ---- ADAPTACIÓN A PANTALLAS MENORES (Móviles / Tablets) ---- */
  @media (max-width: 950px) {
    .deck {
      grid-template-columns: 1fr;
      grid-template-areas: 
        "panel"
        "receipt"
        "calc";
      gap: 20px;
    }
  }
</style>
</head>
<body>
<div class="machine">
  <header class="chassis-header">
    <div class="brand"><span class="brand-led"></span> PUNTO DE COMBOS</div>
    <div class="chassis-sub">terminal de precios · combos streaming</div>
  </header>

  <div class="deck">
    
    <!-- COLUMNA 1: Selector de Panel -->
    <section class="panel panel-col">
      <h2>Selección <span class="eyebrow">terminal</span></h2>

      <div class="tier">
        <div class="tier-label">$10.000 c/u</div>
        <div id="tier-10"></div>
      </div>

      <div class="tier">
        <div class="tier-label">extras · +$1.000</div>
        <div id="tier-11"></div>
      </div>

      <div class="tier">
        <div class="tier-label">$15.000 c/u</div>
        <div id="tier-15"></div>
      </div>

      <!-- Sección: Agregar Plataforma Personalizada -->
      <div class="tier">
        <div class="tier-label">Agregar Plataforma</div>
        <div class="custom-input-group">
          <input type="text" id="custom-platform-name" class="custom-input" placeholder="Ej: Crunchyroll Anual" onkeypress="handleCustomEnter(event)">
          <button class="custom-btn" onclick="addCustomPlatform()">Agregar</button>
        </div>
        <div id="tier-custom"></div>
      </div>

      <!-- Sección: Oferta del día -->
      <div class="tier">
        <div class="tier-label">Oferta Especial</div>
        <label class="checkbox-label">
          <input type="checkbox" id="daily-offer-check" onchange="calcularTotal()">
          Activar "Oferta del día" (Modificar precio libremente)
        </label>
      </div>
    </section>

    <!-- COLUMNA 2: Factura y Controles de Acción -->
    <section class="receipt-col">
      <!-- Factura Visual -->
      <div class="receipt" id="capture-receipt">
        <div class="torn"></div>
        <div class="receipt-body">
          <div class="receipt-title">COMBO STREAMING</div>
          <div class="receipt-sub">recibo de servicios</div>
          <div class="receipt-lines" id="receipt-lines">
            <div class="receipt-empty">Selecciona servicios para armar el combo</div>
          </div>
          <hr class="receipt-dash">
          <div class="receipt-total-row">
            <span>TOTAL</span>
            <span id="total-display">$0</span>
          </div>
          <div class="receipt-note" id="receipt-note"></div>
          <div class="admin-stamp hidden" id="admin-stamp">⚠ CONSULTAR ADMINISTRADOR</div>
          
          <div class="receipt-hours">Horario de atención: 10 am a 8 pm</div>
        </div>
        <div class="torn bottom"></div>
      </div>

      <!-- Casilla Oculta del Administrador -->
      <div id="admin-override-container" class="admin-override-box hidden">
        <label id="admin-override-label" for="admin-price">⚠ LÍMITE EXCEDIDO. DIGITAR PRECIO AUTORIZADO:</label>
        <input type="number" id="admin-price" placeholder="Ej: 45000" oninput="calcularTotal()">
      </div>

      <!-- Grupo de Botones de Acción -->
      <div class="btn-group">
        <button class="action-btn" id="copy-btn" onclick="copiarFactura()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
          Copiar Factura
        </button>

        <button class="action-btn clear-btn" onclick="limpiarTodo()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px;">
            <path d="M3 6h18"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          </svg>
          Limpiar
        </button>
      </div>
    </section>

    <!-- COLUMNA 2 (Debajo de la Factura): Calculadora Independiente -->
    <aside class="calc-col">
      <div class="calc-widget">
        <div class="calc-screen" id="calc-screen">0</div>
        <div class="calc-keys">
          <button class="calc-btn" onclick="addCalc('7')">7</button>
          <button class="calc-btn" onclick="addCalc('8')">8</button>
          <button class="calc-btn" onclick="addCalc('9')">9</button>
          <button class="calc-btn op" onclick="addCalc(' + ')">+</button>

          <button class="calc-btn" onclick="addCalc('4')">4</button>
          <button class="calc-btn" onclick="addCalc('5')">5</button>
          <button class="calc-btn" onclick="addCalc('6')">6</button>
          <button class="calc-btn op" onclick="addCalc(' - ')">-</button>

          <button class="calc-btn" onclick="addCalc('1')">1</button>
          <button class="calc-btn" onclick="addCalc('2')">2</button>
          <button class="calc-btn" onclick="addCalc('3')">3</button>
          <button class="calc-btn op" onclick="addCalc(' * ')">×</button>

          <button class="calc-btn clear" onclick="clearCalc()">C</button>
          <button class="calc-btn" onclick="addCalc('0')">0</button>
          <button class="calc-btn op" onclick="addCalc(' / ')">÷</button>

          <button class="calc-btn equal" onclick="solveCalc()">=</button>
        </div>
      </div>
    </aside>

  </div>
</div>

<script>
  // ---- Datos de servicios ----
  const SERVICES = {
    "10": [
      { name: "Disney (1 Pantalla)", price: 10000 },
      { name: "Prime Video (1 Pantalla)", price: 10000 },
      { name: "ViX (1 Pantalla)", price: 10000 },
      { name: "Crunchyroll (1 Pantalla)", price: 10000 },
      { name: "HBO Max (1 Pantalla)", price: 10000 },
    ],
    "11": [
      { name: "Spotify (1 Cuenta)", price: 11000 },
      { name: "YouTube Premium (1 Cuenta)", price: 11000 },
    ],
    "15": [
      { name: "Netflix (1 Pantalla)", price: 15000 },
      { name: "Disney+ ESPN (1 Pantalla)", price: 15000 },
      { name: "Paramount+ (1 Pantalla)", price: 15000 },
    ],
  };

  function buildTier(containerId, type) {
    const container = document.getElementById(containerId);
    SERVICES[type].forEach((svc, idx) => {
      const row = document.createElement('div');
      row.className = 'service-row';
      row.innerHTML = `
        <div class="service-info">
          <span class="service-name">${svc.name}</span>
          <span class="service-price">$${svc.price.toLocaleString('es-CO')}</span>
        </div>
        <div class="qty-control">
          <button onclick="updateQty(this,-1)">-</button>
          <span class="qty" data-type="${type}" data-name="${svc.name}">0</span>
          <button onclick="updateQty(this,1)">+</button>
        </div>`;
      container.appendChild(row);
    });
  }
  buildTier('tier-10', '10');
  buildTier('tier-11', '11');
  buildTier('tier-15', '15');

  // ---- Lógica de Plataformas Personalizadas ----
  let customPlatforms = [];

  function handleCustomEnter(e) {
    if (e.key === 'Enter') addCustomPlatform();
  }

  function addCustomPlatform() {
    const input = document.getElementById('custom-platform-name');
    const name = input.value.trim();
    if (!name) return;

    let existing = customPlatforms.find(p => p.name === name);
    if (existing) {
      existing.qty++;
    } else {
      customPlatforms.push({ name: name, qty: 1 });
    }
    input.value = '';
    renderCustomPlatforms();
    calcularTotal();
  }

  function updateCustomQty(name, change) {
    let existing = customPlatforms.find(p => p.name === name);
    if (existing) {
      existing.qty += change;
      if (existing.qty <= 0) {
        customPlatforms = customPlatforms.filter(p => p.name !== name);
      }
    }
    renderCustomPlatforms();
    calcularTotal();
  }

  function renderCustomPlatforms() {
    const container = document.getElementById('tier-custom');
    container.innerHTML = '';
    customPlatforms.forEach(p => {
      const row = document.createElement('div');
      row.className = 'service-row active';
      row.innerHTML = `
        <div class="service-info">
          <span class="service-name">${p.name}</span>
          <span class="service-price">Requiere cotización</span>
        </div>
        <div class="qty-control">
          <button onclick="updateCustomQty('${p.name}', -1)">-</button>
          <span class="qty" style="color:#fff;">${p.qty}</span>
          <button onclick="updateCustomQty('${p.name}', 1)">+</button>
        </div>
      `;
      container.appendChild(row);
    });
  }

  // ---- Funciones Base ----
  function updateQty(btn, change) {
    const qtySpan = btn.parentElement.querySelector('.qty');
    let qty = parseInt(qtySpan.innerText) + change;
    if (qty < 0) qty = 0;
    qtySpan.innerText = qty;

    const row = btn.closest('.service-row');
    row.classList.toggle('active', qty > 0);

    calcularTotal();
  }

  function limpiarTodo() {
    document.querySelectorAll('.qty').forEach(span => {
      span.innerText = '0';
    });
    document.querySelectorAll('.service-row').forEach(row => {
      row.classList.remove('active');
    });

    document.getElementById('admin-price').value = '';
    document.getElementById('daily-offer-check').checked = false;
    document.getElementById('custom-platform-name').value = '';
    
    customPlatforms = [];
    renderCustomPlatforms();

    calcularTotal();
  }

  function calcularTotal() {
    let n10 = 0, n15 = 0, extras11 = 0;
    const lines = [];

    // Recoger servicios normales
    document.querySelectorAll('.qty[data-type]').forEach(span => {
      const qty = parseInt(span.innerText);
      const type = span.getAttribute('data-type');
      const name = span.getAttribute('data-name');
      if (qty > 0) {
        if (type === '10') n10 += qty;
        else if (type === '15') n15 += qty;
        else if (type === '11') { n10 += qty; extras11 += qty; }
        lines.push({ name, qty });
      }
    });

    // Añadir servicios personalizados a la factura
    customPlatforms.forEach(p => {
      lines.push({ name: p.name, qty: p.qty });
    });

    const linesEl = document.getElementById('receipt-lines');
    const totalEl = document.getElementById('total-display');
    const adminEl = document.getElementById('admin-stamp');
    const noteEl = document.getElementById('receipt-note');
    const adminBox = document.getElementById('admin-override-container');
    const adminLabel = document.getElementById('admin-override-label');
    const adminInput = document.getElementById('admin-price');

    if (lines.length === 0) {
      linesEl.innerHTML = '<div class="receipt-empty">Selecciona servicios para armar el combo</div>';
    } else {
      linesEl.innerHTML = lines.map(l =>
        `<div class="receipt-line"><span class="name">${l.name}</span><span class="qty">x${l.qty}</span></div>`
      ).join('');
    }

    let calculatedTotal = 0;
    if (n15 === 0) {
      calculatedTotal = [0, 10000, 15000, 19000, 24000, 28000][n10] ?? 0;
    } else if (n15 === 1) {
      if (n10 === 0) calculatedTotal = 15000;
      else if (n10 === 1) calculatedTotal = 20000;
      else if (n10 === 2) calculatedTotal = 24000;
      else if (n10 === 3) calculatedTotal = 28000;
      else calculatedTotal = 28000 + (n10 - 3) * 10000;
    } else if (n15 === 2) {
      if (n10 === 0) calculatedTotal = 28000;
      else if (n10 === 1) calculatedTotal = 32000;
      else if (n10 === 2) calculatedTotal = 36000;
      else calculatedTotal = 36000 + (n10 - 2) * 10000;
    } else if (n15 === 3) {
      calculatedTotal = 36000 + n10 * 10000;
    }
    calculatedTotal += extras11 * 1000;

    // Lógicas para activar el bloque del administrador
    const hasCustom = customPlatforms.length > 0;
    const hasDailyOffer = document.getElementById('daily-offer-check').checked;
    const isLimitExceeded = (n10 > 5 || n15 >= 4 || calculatedTotal > 40000);

    if (isLimitExceeded || hasCustom || hasDailyOffer) {
      adminBox.classList.remove('hidden');

      if (hasCustom) {
        adminLabel.textContent = "⚠ PLATAFORMA NUEVA. DIGITAR PRECIO DEL COMBO:";
      } else if (hasDailyOffer) {
        adminLabel.textContent = "🎁 OFERTA DEL DÍA. DIGITAR PRECIO A COBRAR:";
      } else {
        adminLabel.textContent = "⚠ LÍMITE EXCEDIDO. DIGITAR PRECIO AUTORIZADO:";
      }

      if (adminInput.value && adminInput.value !== '') {
        let finalTotal = parseInt(adminInput.value);
        adminEl.classList.add('hidden');
        totalEl.parentElement.style.visibility = 'visible';
        totalEl.textContent = '$' + finalTotal.toLocaleString('es-CO');
        
        if (hasCustom) {
            noteEl.textContent = 'El admin genera la factura (Sujeto a cotización)';
        } else if (hasDailyOffer) {
            noteEl.textContent = 'Oferta del día aplicada';
        } else {
            noteEl.textContent = 'Precio especial autorizado por administrador';
        }
      } else {
        totalEl.parentElement.style.visibility = 'hidden';
        noteEl.textContent = '';
        adminEl.classList.remove('hidden');
        
        if (hasCustom) {
            adminEl.textContent = '⚠ EL ADMIN GENERA LA FACTURA';
        } else {
            adminEl.textContent = '⚠ CONSULTAR ADMINISTRADOR';
        }
      }
    } else {
      adminBox.classList.add('hidden');
      adminInput.value = ''; 
      adminEl.classList.add('hidden');
      totalEl.parentElement.style.visibility = lines.length ? 'visible' : 'hidden';
      noteEl.textContent = lines.length ? 'precio combo con descuento aplicado' : '';
      totalEl.textContent = calculatedTotal === 0 ? '$0' : '$' + calculatedTotal.toLocaleString('es-CO');
    }
  }

  async function copiarFactura() {
    const btn = document.getElementById('copy-btn');
    const receipt = document.getElementById('capture-receipt');
    const originalText = btn.innerHTML;
    
    if(document.getElementById('total-display').textContent === '$0' && document.getElementById('admin-stamp').classList.contains('hidden')){
        alert("Agrega servicios antes de copiar la factura.");
        return;
    }

    btn.innerHTML = '⏳ Generando...';

    try {
      const canvas = await html2canvas(receipt, {
        backgroundColor: '#15171c',
        scale: 2 
      });

      canvas.toBlob(async function(blob) {
        try {
          const item = new ClipboardItem({ [blob.type]: blob });
          await navigator.clipboard.write([item]);
          
          btn.innerHTML = '✅ ¡Copiado!';
          btn.classList.add('copied');
          
          setTimeout(() => {
            btn.innerHTML = originalText;
            btn.classList.remove('copied');
          }, 2500);
        } catch (err) {
          console.error("Error al copiar al portapapeles:", err);
          alert('Tu navegador no permitió copiar la imagen directamente.');
          btn.innerHTML = originalText;
        }
      });
    } catch (err) {
      console.error(err);
      alert('Hubo un error al generar la factura.');
      btn.innerHTML = originalText;
    }
  }

  // ---- Calculadora ----
  let currentCalc = '0';
  const calcScreen = document.getElementById('calc-screen');

  function addCalc(value) {
    const isOp = ['+', '-', '*', '/'].includes(value.trim());
    if (currentCalc === '0' && !isOp) currentCalc = value;
    else currentCalc += value;
    calcScreen.innerText = currentCalc;
  }
  function clearCalc() {
    currentCalc = '0';
    calcScreen.innerText = currentCalc;
  }
  function solveCalc() {
    try {
      const ans = Function('"use strict"; return (' + currentCalc + ')')();
      currentCalc = ans.toString();
      calcScreen.innerText = currentCalc;
    } catch (e) {
      calcScreen.innerText = 'Error';
      currentCalc = '0';
    }
  }
</script>
